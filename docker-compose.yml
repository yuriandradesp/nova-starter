version: '3.8'

services:
  nova-postgres:
    image: postgres:15-alpine
    container_name: nova-postgres
    restart: always
    environment:
      POSTGRES_USER: nova_admin
      POSTGRES_PASSWORD: nova_password
      POSTGRES_DB: nova_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
